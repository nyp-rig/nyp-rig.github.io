<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup Pointer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .button-wrapper {
      position: relative;
      display: inline-block;
    }

    #signupBtn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    #signupBtn:hover {
      background-color: #0056b3;
    }

    .arrow {
      position: absolute;
      top: 110%;
      right: 90%;
      transform: translateY(-50%) rotate(-30deg);
      margin-left: 0px;
      font-size: 30px;
      animation: bounce 1s ease-in-out infinite;
      color: #007bff;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(-50%) rotate(-30deg); }
      50%      { transform: translateY(-60%) rotate(-30deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="button-wrapper">
      <button id="signupBtn">Sign Up</button>
      <span class="arrow">➤</span> <!-- Unicode arrow that looks good rotated -->
    </div>
  </div>

  <script>
    document.getElementById("signupBtn").addEventListener("click", function () {
      window.location.href = "signup.html";
    });
  </script>
</body>
</html>
