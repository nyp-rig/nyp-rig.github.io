<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <title>NYP ROBOTICS INTEREST GROUP</title>
  <link rel="stylesheet" href="./scss/join-us.scss">
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">NYP RIG</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
        aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/building">Building</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/programming">Programming</a>
          </li>
          <!-- <li class="nav-item">
            <a class="nav-link" href="#">Our Team</a>
          </li> -->
        </ul>
        <div class="join-us-nav-btn-contain">
          <a class="btn btn-success has-loading-aft-click" href="/join-us">Join Us</a>
        </div>
      </div>
    </div>
  </nav>
  <div class="join-us-special-contain">
    <form class="join-us-box shadow-lg"
      action="https://docs.google.com/forms/d/e/1FAIpQLSfsMr1gZWeCYxm56wmyequeWXvSGnZL1knWkdR3IWcYGVo6Ag/formResponse"
      method="POST" target="_self">
      <div class="mb-3 text-center">
        <h3>Join Us!</h3>
        <h5>Become a member of NYP's Robotics Interest Group!</h5>
      </div>
      <div class="mb-3">
        <label class="form-label">Email:</label>
        <input class="form-control" type="email" name="emailAddress" placeholder="Enter your NYP email address here" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Full Name:</label>
        <input class="form-control" type="text" name="entry.851075444" required>
      </div>
        
      <div class="mb-3">  
        <label class="form-label">Year:</label>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="entry.207949549" value="PFP" required>
          <label class="form-check-label">PFP</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="entry.207949549" value="Year 1" required>
          <label class="form-check-label">Year 1</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="entry.207949549" value="Year 2" required>
          <label class="form-check-label">Year 2</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="entry.207949549" value="Year 3" required>
          <label class="form-check-label">Year 3</label>
        </div>
      </div>

      <div class="mb-3">  
        <label class="form-label">Class (e.g. S1-1):</label>
        <input class="form-control" type="text" name="entry.897263461" required>
      </div>
        
      <div class="mb-3">
        <label class="form-label">Reasons for Joining:</label>
        <textarea class="form-control" name="entry.1365629489" rows="4" cols="50" required></textarea>
      </div>

      <button class="btn btn-success has-loading-aft-click" type="submit">Submit</button>
    </form>
  </div>
  <script src="./js/index.js" type="module"></script>
</body>

</html>
